<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IPTV Cast Receiver</title>
    <style>
        body { margin: 0; padding: 0; background: #000; overflow: hidden; }
        video { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; background: #000; }
        #debug {
            position: absolute; top: 10px; left: 10px; z-index: 999;
            color: #0f0; font-family: monospace; font-size: 14px;
            background: rgba(0,0,0,0.7); padding: 10px; border-radius: 5px;
            max-width: 90vw; max-height: 90vh; overflow: auto;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="debug"></div>
    <video id="media" autoplay></video>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7"></script>
    <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <script>
        'use strict';
        const TAG = '[Receiver]';
        const video = document.getElementById('media');
        const debugEl = document.getElementById('debug');
        let hls = null;
        let lastUrl = null;
        let debugLines = [];

        function log(msg) {
            console.log(TAG, msg);
            debugLines.push(new Date().toLocaleTimeString() + ' ' + msg);
            if (debugLines.length > 20) debugLines.shift();
            debugEl.innerHTML = debugLines.join('<br>');
        }

        const context = cast.framework.CastReceiverContext.getInstance();
        const playerManager = context.getPlayerManager();

        log('🚀 Receiver starting...');
        log('📱 UA: ' + navigator.userAgent.substring(0, 60));
        log('🔧 hls.js supported: ' + Hls.isSupported());

        function cleanupHls() {
            if (hls) { hls.destroy(); hls = null; }
        }

        // ━━━━━━ LOAD interceptor ━━━━━━
        // Let CAF handle playback natively (supports HTTP HLS).
        // We just ensure contentType is correct.
        playerManager.setMessageInterceptor(
            cast.framework.messages.MessageType.LOAD,
            (request) => {
                cleanupHls();
                const url = request.media.contentUrl || request.media.contentId;
                const contentType = (request.media.contentType || '').toLowerCase();
                log('📥 LOAD: ' + (url ? url.substring(0, 80) : 'null'));
                log('📦 type: ' + contentType);
                lastUrl = url;

                if (url) {
                    request.media.contentUrl = url;
                    request.media.contentId = url;
                }

                // Fix content type for HLS if needed
                if (url && url.includes('.m3u8') && !contentType.includes('mpegurl')) {
                    request.media.contentType = 'application/x-mpegURL';
                    log('🔧 Fixed HLS content type');
                }

                log('📺 → CAF native player');
                return request;
            }
        );

        // ━━━━━━ ERROR: fallback to hls.js ━━━━━━
        playerManager.addEventListener(
            cast.framework.events.EventType.ERROR,
            (event) => {
                log('❌ CAF error: ' + (event.detailedErrorCode || 'unknown'));

                if (lastUrl && lastUrl.includes('.m3u8') && Hls.isSupported()) {
                    log('🔄 Fallback → hls.js');
                    hls = new Hls({
                        debug: false, enableWorker: true,
                        lowLatencyMode: false, backBufferLength: 30,
                        maxBufferLength: 30, maxMaxBufferLength: 60,
                        startLevel: -1, fragLoadingMaxRetry: 10,
                        manifestLoadingMaxRetry: 6, levelLoadingMaxRetry: 6,
                        fragLoadingRetryDelay: 1000,
                    });
                    hls.on(Hls.Events.MANIFEST_PARSED, () => {
                        log('✅ hls.js manifest OK');
                        video.play().catch(e => log('⚠️ play: ' + e.message));
                    });
                    hls.on(Hls.Events.ERROR, (e, data) => {
                        log('❌ hls.js: ' + data.details);
                        if (data.fatal) {
                            if (data.type === Hls.ErrorTypes.NETWORK_ERROR) hls.startLoad();
                            else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) hls.recoverMediaError();
                            else cleanupHls();
                        }
                    });
                    hls.on(Hls.Events.FRAG_LOADED, () => {
                        setTimeout(() => { debugEl.style.display = 'none'; }, 3000);
                    });
                    hls.loadSource(lastUrl);
                    hls.attachMedia(video);
                }
            }
        );

        // ━━━━━━ Media events ━━━━━━
        playerManager.addEventListener(
            cast.framework.events.EventType.PLAYER_LOAD_COMPLETE,
            () => {
                log('🎉 CAF PLAYING!');
                setTimeout(() => { debugEl.style.display = 'none'; }, 3000);
            }
        );

        video.addEventListener('playing', () => log('🎉 PLAYING'));
        video.addEventListener('error', () => {
            const err = video.error;
            log('❌ Video: ' + (err ? 'code=' + err.code + ' ' + err.message : 'unknown'));
        });

        // ━━━━━━ Start ━━━━━━
        const options = new cast.framework.CastReceiverOptions();
        options.disableIdleTimeout = true;
        options.mediaElement = video;
        context.start(options);
        log('✅ Receiver started');
    </script>
</body>
</html>
